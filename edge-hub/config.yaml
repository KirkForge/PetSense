rooms:
  - name: living-room
    bounds: { x1: 0, y1: 0, x2: 6, y2: 5 }
  - name: kitchen
    bounds: { x1: 6, y1: 0, x2: 10, y2: 5 }
  - name: bedroom
    bounds: { x1: 0, y1: 5, x2: 4, y2: 10 }

nodes:
  - id: esp32-living-room
    position: { x: 3, y: 2.5, z: 1.5 }
  - id: esp32-kitchen
    position: { x: 8, y: 2.5, z: 1.5 }
  - id: esp32-bedroom
    position: { x: 2, y: 7.5, z: 1.5 }

zones:
  - name: kitchen-alert
    type: alert
    room: kitchen
    message: "Pet entered the kitchen"

mqtt:
  port: 1883
  wsPort: 8083

api:
  port: 3000
  tls:
    enabled: false
    certFile: /etc/petsense/cert.pem
    keyFile: /etc/petsense/key.pem
  cors:
    origins:
      - "http://localhost:5173"
      - "https://app.petsense.local"
