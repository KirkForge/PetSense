name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (Svelte/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm test

  edge-hub:
    name: Edge Hub (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: edge-hub/package-lock.json
      - name: Install deps
        run: npm install
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Test (vitest)
        run: npm test

  firmware:
    name: Firmware (PlatformIO)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Materialize secrets.h from template
        run: cp src/secrets.h.template src/secrets.h
      - name: Build firmware
        run: pio run
