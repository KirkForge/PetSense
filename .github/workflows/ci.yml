name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (Svelte/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm test

  edge-hub:
    name: Edge Hub (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # ponytail: no npm cache — edge-hub has no package-lock.json yet (gap #6),
      # so a cache-dependency-path would be a dead key. Add when lockfile lands.
      - name: Install deps
        run: npm install
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit
