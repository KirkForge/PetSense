# Dependabot configuration for PetSense
#
# This file intentionally disables Dependabot update PRs for this repository
# to avoid churn. Vulnerability alerts and the dependency graph remain enabled;
# only automated update PRs are stopped.
#
# This repo has three CI workflow jobs in `.github/workflows/ci.yml`:
# App (Svelte/TS), Edge Hub (TypeScript), and Firmware (PlatformIO).
# The earlier rationale claiming "does not use GitHub Actions" was incorrect.
#
# To re-enable Dependabot update PRs, add entries under `updates:`
# for `npm` (app + edge-hub) and `github-actions`:
#
#   updates:
#     - package-ecosystem: npm
#       directory: /app
#       schedule: { interval: weekly }
#     - package-ecosystem: npm
#       directory: /edge-hub
#       schedule: { interval: weekly }
#     - package-ecosystem: github-actions
#       directory: /
#       schedule: { interval: weekly }

version: 2
# No `updates:` block → Dependabot runs no scheduled jobs for this repo.
