model:
  name: "petsense-cnn-v0"
  input_shape: [128, 8]  # time_steps, pca_components
  num_conv_blocks: 3
  filters: [32, 64, 128]
  kernel_sizes: [7, 5, 3]
  dense_units: 64
  dropout: 0.4

training:
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  max_epochs: 150
  early_stopping_patience: 15
  mixed_precision: true
  optimizer: "adamw"
  scheduler: "cosine_warm_restarts"

data:
  window_size: 128
  stride: 64
  sample_rate_hz: 50
  pca_components: 8
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  augmentation:
    time_stretch_range: [0.85, 1.15]
    amplitude_jitter: 0.05
    noise_floor_shift_db: [-3, 3]

export:
  opset_version: 17
  quantize_int8: true
  calibrate_samples: 100
